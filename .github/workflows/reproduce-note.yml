name: VolMax Open Market Notes Reproduction Workflow

on:
  push:
    tags:
      - 'note-*-run'
      - 'note-*-params-frozen'

permissions:
  contents: write
  pull-requests: write

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse Note ID from tag
        id: parse_tag
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "Triggered by tag: $TAG_NAME"
          # Extract note number, e.g., note-002-run -> 002
          NOTE_NUM=$(echo "$TAG_NAME" | cut -d'-' -f2)
          echo "NOTE_NUM=$NOTE_NUM" >> $GITHUB_ENV
          
          # Find matching directory
          NOTE_DIR=$(find notes -maxdepth 1 -name "${NOTE_NUM}-*" -type d | head -n 1)
          if [ -z "$NOTE_DIR" ]; then
            echo "Error: No directory found matching note number $NOTE_NUM"
            exit 1
          fi
          echo "NOTE_DIR=$NOTE_DIR" >> $GITHUB_ENV
          echo "Found note directory: $NOTE_DIR"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          if [ -f "$NOTE_DIR/requirements.txt" ]; then
            pip install -r "$NOTE_DIR/requirements.txt"
          fi
          # Ensure core libraries are installed
          pip install numpy pandas matplotlib seaborn requests jinja2

      - name: Run Note Reproduction Script
        run: |
          cd "$NOTE_DIR"
          if [ -f "reproduce.py" ]; then
            python reproduce.py
          else
            echo "reproduce.py not found in $NOTE_DIR. Skipping execution step."
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "reproduce(note-${{ env.NOTE_NUM }}): auto-generated results from tag ${{ github.ref_name }}"
          committer: GitHub <noreply@github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: reproduce-note-${{ env.NOTE_NUM }}
          title: "reproduce: Auto-generate results for Note ${{ env.NOTE_NUM }}"
          body: |
            This PR was automatically generated by the VolMax Notes Reproduction Workflow.
            
            Triggered by tag: `${{ github.ref_name }}`
            Note Directory: `${{ env.NOTE_DIR }}`
            
            Please verify the generated plots, `results.json`, and any updates to the `README.md` before merging.
          labels: |
            reproduction
            automated-pr
